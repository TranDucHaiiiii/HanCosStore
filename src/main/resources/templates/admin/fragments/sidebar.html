<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<div class="sidebar" th:fragment="sidebar(active)">
    <a th:href="@{/}" class="sidebar-brand">
        <i class="fas fa-shopping-bag me-2"></i>
        <span>HANCOS</span>
    </a>

    <nav class="nav flex-column">

        <a class="nav-link"
           th:classappend="${active == 'dashboard'} ? ' active'"
           th:href="@{/admin/dashboard}">
            <i class="fas fa-th-large"></i><span class="nav-link-label">Dashboard</span>
        </a>

        <a class="nav-link"
           th:classappend="${active == 'products'} ? ' active'"
           th:href="@{/san-pham}">
            <i class="fas fa-box"></i><span class="nav-link-label">Sản phẩm</span>
        </a>

        <a class="nav-link"
           th:classappend="${active == 'inventory'} ? ' active'"
           th:href="@{/admin/inventory}">
            <i class="fas fa-warehouse"></i><span class="nav-link-label">Quản lí kho</span>
        </a>

        <a class="nav-link"
           th:classappend="${active == 'pos'} ? ' active'"
           th:href="@{/admin/ban-hang-tai-quay}">
            <i class="fas fa-cash-register"></i><span class="nav-link-label">Bán hàng tại quầy</span>
        </a>

        <a class="nav-link"
           th:if="${session.ROLES != null and #lists.contains(session.ROLES,'ADMIN')}"
           th:classappend="${active == 'categories'} ? ' active'"
           th:href="@{/admin/categories}">
            <i class="fas fa-list"></i><span class="nav-link-label">Danh mục</span>
        </a>

        <a class="nav-link"
           th:if="${session.ROLES != null and #lists.contains(session.ROLES,'ADMIN')}"
           th:classappend="${active == 'vouchers'} ? ' active'"
           th:href="@{/admin/vouchers}">
            <i class="fas fa-ticket-alt"></i><span class="nav-link-label">Voucher</span>
        </a>

        <a class="nav-link"
           th:if="${session.ROLES != null and #lists.contains(session.ROLES,'ADMIN')}"
           th:classappend="${active == 'thongke'} ? ' active'"
           th:href="@{/admin/thong-ke}">
            <i class="fas fa-chart-line"></i><span class="nav-link-label">Thống kê</span>
        </a>

        <a class="nav-link"
              data-orders-link="true"
              th:attr="data-pending-url=@{/admin/orders/pending-count}"
           th:classappend="${active == 'orders'} ? ' active'"
           th:href="@{/admin/orders}">
            <i class="fas fa-shopping-cart"></i>
            <span class="nav-link-label">Đơn hàng</span>
            <span class="sidebar-badge"
                  th:if="${adminPendingOrderCount > 0}"
                  th:text="${adminPendingOrderCount}">0</span>
        </a>

        <a class="nav-link"
           th:classappend="${active == 'returns'} ? ' active'"
           th:href="@{/admin/returns}">
            <i class="fas fa-undo-alt"></i><span class="nav-link-label">Trả hàng</span>
        </a>

        <a class="nav-link"
           th:if="${session.ROLES != null and #lists.contains(session.ROLES,'ADMIN')}"
           th:classappend="${active == 'users'} ? ' active'"
           th:href="@{/admin/users}">
            <i class="fas fa-users"></i><span class="nav-link-label">Tài khoản</span>
        </a>

        <div class="mt-auto pt-5">
            <hr class="text-white-50">
            <a class="nav-link text-danger" th:href="@{/logout}">
                <i class="fas fa-sign-out-alt"></i><span class="nav-link-label">Đăng xuất</span>
            </a>
        </div>

    </nav>
</div>

<script>
    (() => {
        const ordersLink = document.querySelector('.sidebar [data-orders-link="true"]');
        if (!ordersLink) {
            return;
        }

        const pendingUrl = ordersLink.getAttribute('data-pending-url');
        if (!pendingUrl) {
            return;
        }

        const renderBadge = (count) => {
            let badge = ordersLink.querySelector('.sidebar-badge');
            if (count > 0) {
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'sidebar-badge';
                    ordersLink.appendChild(badge);
                }
                badge.textContent = count > 99 ? '99+' : String(count);
            } else if (badge) {
                badge.remove();
            }
        };

        const fetchPendingCount = async () => {
            try {
                const response = await fetch(pendingUrl, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                const count = Number(data?.count ?? 0);
                renderBadge(Number.isFinite(count) ? count : 0);
            } catch (_) {
                // Ignore transient network errors for sidebar polling.
            }
        };

        fetchPendingCount();
        setInterval(fetchPendingCount, 30000);
    })();
</script>

</body>
</html>
