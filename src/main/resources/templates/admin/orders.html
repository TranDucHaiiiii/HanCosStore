<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - HANCOS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/orders.css}">
</head>

<body>

    <div th:replace="~{admin/fragments/sidebar :: sidebar('orders')}"></div>

    <div class="main-content">
        <header class="top-header">
            <h4 class="fw-800 mb-0 text-uppercase letter-spacing-1 d-flex align-items-center gap-2 flex-wrap">
                <span>Quản lý đơn hàng</span>
                    <span class="badge bg-danger rounded-pill"
                        th:if="${orderStatusCounts['CHO_XAC_NHAN'] > 0}"
                        th:text="${orderStatusCounts['CHO_XAC_NHAN']} + ' cần xác nhận'">0 cần xác nhận</span>
            </h4>
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-circle bg-soft-primary d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px;">
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>
        </header>

        <!-- Filter Status -->
        <div class="card mb-4">
            <div class="card-body p-4">
                <form th:action="@{/admin/orders}" method="get" class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i
                                    class="fas fa-search"></i></span>
                            <input type="text" name="keyword" class="form-control border-start-0 ps-0"
                                th:value="${keyword}" placeholder="Mã đơn, tên khách, SĐT...">
                        </div>
                    </div>
                    <input type="hidden" name="status" th:value="${currentStatus}">
                    <div class="col-md-8">
                        <div class="d-flex gap-2 flex-wrap justify-content-end">
                            <a th:each="filter : ${statusFilters}"
                                th:href="@{/admin/orders(status=${filter.key}, keyword=${keyword})}" class="filter-btn"
                                th:classappend="${currentStatus == filter.key ? 'active' : ''}"
                                th:text="${filter.label + ' (' + filter.count + ')'}">
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Mã đơn hàng</th>
                                <th>Khách hàng</th>
                                <th>Ngày đặt</th>
                                <th>Thanh toán</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td class="ps-4"><code class="fw-800 text-dark"
                                        th:text="${order.maDonHang}">DH001</code></td>
                                <td>
                                    <div th:text="${order.hoTenNhan}" class="fw-700 text-dark">Nguyễn Văn A</div>
                                    <small class="text-muted" th:text="${order.soDienThoaiNhan}">0123456789</small>
                                </td>
                                <td class="small text-muted"
                                    th:text="${#temporals.format(order.ngayDat, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                                <td>
                                    <span class="badge bg-light text-dark border text-uppercase"
                                        style="font-size: 10px;" th:text="${order.phuongThucThanhToan}">COD</span>
                                </td>
                                <td class="fw-800 text-danger"
                                    th:text="${#numbers.formatDecimal(order.tongTien, 0, 'COMMA', 0, 'POINT')} + '₫'">0₫
                                </td>
                                <td>
                                    <span class="badge-status"
                                        th:with="st=${order.trangThai}"
                                        th:classappend="${st == 'CHO_XAC_NHAN' or st == 'PENDING' ? 'badge-pending' :
                                            st == 'DA_XAC_NHAN' or st == 'CONFIRMED' ? 'badge-confirmed' :
                                            st == 'DANG_GIAO' or st == 'SHIPPING' ? 'badge-shipping' :
                                            st == 'LOI_VAN_CHUYEN' or st == 'LOST' ? 'badge-cancelled' :
                                            st == 'HOAN_THANH' or st == 'COMPLETED' or st == 'DELIVERED' ? 'badge-delivered' :
                                            st == 'TRA_HANG' or st == 'RETURN_REQUESTED' or st == 'RETURNED' ? 'badge-cancelled' :
                                            st == 'DA_HUY' or st == 'CANCELLED' ? 'badge-cancelled' : 'badge-cancelled'}"
                                        th:text="${st == 'CHO_XAC_NHAN' or st == 'PENDING' ? 'Chờ xác nhận' :
                                            st == 'DA_XAC_NHAN' or st == 'CONFIRMED' ? 'Đã xác nhận' :
                                            st == 'DANG_GIAO' or st == 'SHIPPING' ? 'Đang giao' :
                                            st == 'LOI_VAN_CHUYEN' or st == 'LOST' ? 'Lỗi vận chuyển' :
                                            st == 'HOAN_THANH' or st == 'COMPLETED' or st == 'DELIVERED' ? 'Hoàn thành' :
                                            st == 'TRA_HANG' or st == 'RETURN_REQUESTED' or st == 'RETURNED' ? 'Trả hàng' :
                                            st == 'DA_HUY' or st == 'CANCELLED' ? 'Đã hủy' : 'Đã hủy'}">
                                        TRANG_THAI
                                    </span>
                                </td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn-action">
                                        <i class="fas fa-eye me-2"></i> Chi tiết
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(orders)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="fas fa-receipt fa-3x mb-3 d-block opacity-20"></i>
                                    Không có đơn hàng nào.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
