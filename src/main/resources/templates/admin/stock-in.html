<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhap Kho Bien The - HANCOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/stock-in.css}">
</head>
<body>

<div th:replace="~{admin/fragments/sidebar :: sidebar('products')}"></div>

<div class="main-content">

    <div class="page-header">
        <h1 class="page-title">
            <span>Quan ly kho hang</span>
            Nhap Kho Bien The
        </h1>
        <a th:href="@{/admin/san-pham/view/{id}(id=${bienThe.sanPham.id})}" class="btn-back">
            ? Quay lai san pham
        </a>
    </div>

    <div class="info-card">
        <div class="info-card-inner">
            <div class="info-field">
                <div class="info-label">Ma SKU</div>
                <div class="info-value" th:text="${bienThe.maSKU}">SKU-00123</div>
            </div>
            <div class="info-field">
                <div class="info-label">Mau sac</div>
                <div class="info-value" th:text="${bienThe.mauSac}">Den</div>
            </div>
            <div class="info-field">
                <div class="info-label">Kich co</div>
                <div class="info-value" th:text="${bienThe.kichCo}">L</div>
            </div>
            <div class="info-field">
                <div class="info-label">Ton hien tai</div>
                <div class="info-value">
                    <span class="stock-badge" th:text="${bienThe.soLuongTon}">42</span>
                </div>
            </div>
        </div>
    </div>

    <div class="form-card">
        <div class="form-section-label">Cap nhat ton kho</div>

        <form th:action="@{/admin/san-pham/{id}/them-so-luong(id=${bienThe.sanPham.id})}" method="post">
            <input type="hidden" name="bienTheId" th:value="${bienThe.id}">

            <div th:if="${successMessage}" class="alert-styled alert-success-styled" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert-styled alert-danger-styled" th:text="${errorMessage}"></div>

            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label-styled">So luong nhap them</label>
                    <input type="number" min="1" step="1" class="form-control-styled"
                           name="soLuongThem" placeholder="Nhap so luong..." required>
                </div>
                <div class="col-md-4">
                    <label class="form-label-styled">Ghi chu</label>
                    <input type="text" class="form-control-styled" name="ghiChu" maxlength="300" placeholder="Nhap ghi chu (neu co)">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn-submit">Cap nhat ton kho</button>
                </div>
            </div>
        </form>
    </div>

    <div class="history-card">
        <div class="history-header">
            <h2 class="history-title">Lịch sử giao dịch tồn kho</h2>
            <span class="history-count">LOG</span>
        </div>
        <div class="table-responsive">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Loại giao dịch</th>
                        <th>Số lượng</th>
                        <th>Người thực hiện</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ls : ${lichSuNhapKho}">
                        <td th:text="${ls.ngayTao != null ? #temporals.format(ls.ngayTao, 'dd/MM/yyyy HH:mm:ss') : '-'}"></td>
                        <td>
                            <span class="type-chip"
                                  th:classappend="${ls.loaiGiaoDich == 'NHAP'} ? ' type-chip-import' : ' type-chip-export'"
                                  th:text="${ls.loaiGiaoDich == 'NHAP'} ? 'Nhập kho' : 'Xuất kho'">Nhập kho</span>
                        </td>
                        <td>
                            <span class="qty-chip"
                                  th:classappend="${ls.loaiGiaoDich == 'NHAP'} ? ' qty-chip-import' : ' qty-chip-export'"
                                  th:text="${(ls.loaiGiaoDich == 'NHAP' ? '+' : '-') + ls.soLuongNhap}">+1</span>
                        </td>
                        <td th:text="${ls.nguoiNhap}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(lichSuNhapKho)}" class="empty-row">
                        <td colspan="4">- Chưa có lịch sử giao dịch tồn kho -</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div class="brand-mark">HANCOS</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
