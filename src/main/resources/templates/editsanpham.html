<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Sản Phẩm - HANCOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/editsanpham-page.css}">
</head>

<body>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>ĐANG CẬP NHẬT...</p>
</div>

<div class="header">
    <div class="header-content">
        <a th:href="@{/static}" class="logo">HANCOS</a>
        <div class="nav-links">
            <a th:href="@{/san-pham}">Quay lại danh sách</a>
        </div>
    </div>
</div>

<div class="banner">
    <h1>CHỈNH SỬA SẢN PHẨM</h1>
    <p th:text="${product.maSanPham + ' - ' + product.ten}"></p>
</div>

<div class="container">
    <div class="form-container">
        <form id="editForm" method="post" th:action="@{/admin/san-pham/edit/{id}(id=${product.id})}">
            <input type="hidden" id="productId" th:value="${product.id}">

            <!-- Thông tin cơ bản -->
            <div class="section">
                <h2 class="section-title">Thông Tin Cơ Bản</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mã Sản Phẩm</label>
                        <input type="text" id="maSanPham" th:value="${product.maSanPham}" readonly style="background:#f8f9fa;">
                    </div>
                    <div class="form-group">
                        <label>Tên Sản Phẩm <span class="required">*</span></label>
                        <input type="text" id="ten" name="ten" th:value="${product.ten}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Chất Liệu</label>
                        <input type="text" id="chatLieu" name="chatLieu" th:value="${product.chatLieu}">
                    </div>
                    <div class="form-group">
                        <label>Giới Tính</label>
                        <select id="gioiTinh" name="gioiTinh">
                            <option value="UNISEX" th:selected="${product.gioiTinh == 'UNISEX'}">Unisex</option>
                            <option value="NAM" th:selected="${product.gioiTinh == 'NAM'}">Nam</option>
                            <option value="NU" th:selected="${product.gioiTinh == 'NU'}">Nữ</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Danh Mục Cha</label>
                        <select id="parentDanhMucId" onchange="loadChildren()">
                            <option value="">-- Chọn danh mục cha --</option>
                            <option th:each="dm : ${parentDanhMuc}"
                                    th:value="${dm.id}"
                                    th:text="${dm.ten}"
                                    th:selected="${(product.parentDanhMucId != null ? product.parentDanhMucId : product.danhMucId) == dm.id}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Danh Mục Con</label>
                        <select id="danhMucId">
                            <option value="">-- Chọn danh mục con --</option>
                        </select>
                        <input type="hidden" id="finalDanhMucId" name="danhMucId">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Mô Tả Ngắn</label>
                        <textarea id="moTaNgan" name="moTaNgan" rows="3" th:text="${product.moTaNgan}"></textarea>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Mô Tả Chi Tiết</label>
                        <textarea id="moTa" name="moTa" rows="5" th:text="${product.moTa}"></textarea>
                    </div>
                </div>
            </div>

            <!-- Biến thể -->
            <div class="section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 class="section-title" style="margin-bottom:0;">Biến Thể</h2>
                    <button type="button" class="btn btn-add" onclick="addVariant()">
                        <i class="fas fa-plus"></i> Thêm Biến Thể
                    </button>
                </div>
                <div id="variantsList"></div>
            </div>

            <!-- Hình ảnh gallery -->
            <div class="section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 class="section-title" style="margin-bottom:0;">Hình Ảnh Gallery</h2>
                    <button type="button" class="btn btn-add" onclick="addImage()">
                        <i class="fas fa-image"></i> Thêm Hình Ảnh
                    </button>
                </div>
                <div id="imagePasteArea"
                     tabindex="0"
                     style="margin-bottom:16px; padding:12px; border:1px dashed #b8b8b8; border-radius:6px; background:#fafafa; color:#666; font-size:13px;">
                    Chọn ô ảnh cần thay, bấm vào đây rồi nhấn Ctrl + V để thay ảnh đó.
                </div>
                <div id="imagesList"></div>
            </div>

            <!-- Hình ảnh theo màu -->
            <div class="section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 class="section-title" style="margin-bottom:0;">Hình Ảnh Theo Màu</h2>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button type="button" class="btn btn-add" onclick="syncColors()">
                            <i class="fas fa-sync"></i> Đồng Bộ Màu
                        </button>
                        <button type="button" class="btn btn-add" onclick="addColorImage()">
                            <i class="fas fa-palette"></i> Thêm Hình Màu
                        </button>
                    </div>
                </div>
                <div id="colorImagePasteArea"
                     tabindex="0"
                     style="margin-bottom:16px; padding:12px; border:1px dashed #b8b8b8; border-radius:6px; background:#fafafa; color:#666; font-size:13px;">
                    Chọn ô hình màu cần thay, bấm vào đây rồi nhấn Ctrl + V.
                </div>
                <div id="colorImagesList"></div>
            </div>

            <div class="actions">
                <a th:href="@{/san-pham}" class="btn btn-secondary">Hủy bỏ</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu thay đổi
                </button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const initialProduct = /*[[${product}]]*/ {};
    const API_URL = '/api';
    const pendingUploads = new Set();
    let activeGalleryImageIndex = null;
    let activeColorImageIndex = null;

    const COLORS = ["Đen","Trắng","Đỏ","Xanh dương","Xanh lá","Vàng","Cam","Tím","Hồng","Nâu","Xám","Be"];
    const SIZES  = ["XS","S","M","L","XL","XXL"];

    document.addEventListener('DOMContentLoaded', async () => {
        // Load danh mục con
        if (document.getElementById('parentDanhMucId').value) {
            await loadChildren();
            if (initialProduct && initialProduct.danhMucId) {
                document.getElementById('danhMucId').value = initialProduct.danhMucId;
            }
        }

        // Populate existing variants/images/color-images
        if (initialProduct && initialProduct.bienThes && initialProduct.bienThes.length) {
            initialProduct.bienThes.forEach(bt => addVariant(bt));
        } else {
            addVariant();
        }

        if (initialProduct && initialProduct.hinhAnhSanPhams && initialProduct.hinhAnhSanPhams.length) {
            initialProduct.hinhAnhSanPhams.forEach(img => addImage(img));
        } else {
            addImage();
        }

        if (initialProduct && initialProduct.hinhAnhMauSacs && initialProduct.hinhAnhMauSacs.length) {
            initialProduct.hinhAnhMauSacs.forEach(cimg => addColorImage(cimg));
        }

        const pasteArea = document.getElementById('imagePasteArea');
        if (pasteArea) {
            pasteArea.addEventListener('click', () => pasteArea.focus());
            pasteArea.addEventListener('paste', handleGalleryPaste);
        }

        const colorPasteArea = document.getElementById('colorImagePasteArea');
        if (colorPasteArea) {
            colorPasteArea.addEventListener('click', () => colorPasteArea.focus());
            colorPasteArea.addEventListener('paste', handleColorImagePaste);
        }

        const imagesListEl = document.getElementById('imagesList');
        if (imagesListEl) {
            imagesListEl.addEventListener('click', (e) => {
                const item = e.target.closest('.image-item');
                if (item) setActiveGalleryImage(item);
            });
        }

        const colorImagesListEl = document.getElementById('colorImagesList');
        if (colorImagesListEl) {
            colorImagesListEl.addEventListener('click', (e) => {
                const item = e.target.closest('.image-item');
                if (item) setActiveColorImage(item);
            });
        }
    });

    async function loadChildren() {
        const parentId = document.getElementById('parentDanhMucId').value;
        const select = document.getElementById('danhMucId');
        select.innerHTML = '<option value="">-- Chọn danh mục con --</option>';
        if (!parentId) return;

        try {
            const res = await fetch(`${API_URL}/danh-muc/${parentId}/children`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            if (res.ok) {
                const children = await res.json();
                children.forEach(dm => {
                    const opt = document.createElement('option');
                    opt.value = dm.id;
                    opt.textContent = dm.ten;
                    select.appendChild(opt);
                });
            }
        } catch (e) {
            console.error('loadChildren error:', e);
        }
    }

    // ===== Helpers =====
    function removeVietnameseTones(str) {
        if (!str) return "";
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ|À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ|È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "e");
        str = str.replace(/ì|í|ị|ỉ|ĩ|Ì|Í|Ị|Ỉ|Ĩ/g, "i");
        str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ|Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ|Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "u");
        str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ|Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "y");
        str = str.replace(/đ|Đ/g, "d");
        return str;
    }

    function toSkuToken(s) {
        return removeVietnameseTones(s)
            .trim()
            .toUpperCase()
            .replace(/\s+/g, "_");
    }

    function updateSKUFromEl(el) {
        const item = el.closest('.variant-item');
        if (item) updateSKUItem(item);
    }

    function updateSKUItem(item) {
        const maSP = (document.getElementById('maSanPham').value || '').trim();
        const mauEl = item.querySelector('select[name$=".mauSac"]');
        const sizeEl = item.querySelector('select[name$=".kichCo"]');
        const skuEl = item.querySelector('input[name$=".maSKU"]');

        if (!mauEl || !sizeEl || !skuEl) return;

        const mau = mauEl.value || '';
        const size = sizeEl.value || '';

        if (maSP && mau && size) {
            const newSku = `${toSkuToken(maSP)}_${toSkuToken(mau)}_${toSkuToken(size)}`;
            if (skuEl.value !== newSku) {
                skuEl.value = newSku;
            }
        }
    }

    function renderOptions(arr, selected) {
        return arr.map(v => `<option value="${v}" ${selected === v ? 'selected' : ''}>${v}</option>`).join('');
    }

    function reindexVariantsUI() {
        const list = document.getElementById('variantsList');
        list.querySelectorAll('.variant-item').forEach((item, i) => {
            item.setAttribute('data-index', i);
            const num = item.querySelector('.item-number');
            if (num) num.innerHTML = `<i class="fas fa-tags"></i> Biến thể #${i + 1}`;

            const idInput = item.querySelector('input[data-field="id"]');
            const mauSac = item.querySelector('select[data-field="mauSac"]');
            const kichCo = item.querySelector('select[data-field="kichCo"]');
            const maSKU = item.querySelector('input[data-field="maSKU"]');
            const soLuongTon = item.querySelector('input[data-field="soLuongTon"]');
            const khoiLuong = item.querySelector('input[data-field="khoiLuongGram"]');
            const gia = item.querySelector('input[data-field="gia"]');
            const trangThai = item.querySelector('input[data-field="trangThai"]');

            if (idInput) idInput.name = `bienThes[${i}].id`;
            if (mauSac) mauSac.name = `bienThes[${i}].mauSac`;
            if (kichCo) kichCo.name = `bienThes[${i}].kichCo`;
            if (maSKU) maSKU.name = `bienThes[${i}].maSKU`;
            if (soLuongTon) soLuongTon.name = `bienThes[${i}].soLuongTon`;
            if (khoiLuong) khoiLuong.name = `bienThes[${i}].khoiLuongGram`;
            if (gia) gia.name = `bienThes[${i}].gia`;
            if (trangThai) trangThai.name = `bienThes[${i}].trangThai`;
        });
    }

    function reindexImages() {
        const list = document.getElementById('imagesList');
        const items = list.querySelectorAll('.image-item');

        items.forEach((item, i) => {
            item.setAttribute('data-index', i);

            const num = item.querySelector('.item-number');
            if (num) num.innerHTML = `<i class="fas fa-image"></i> Hình ảnh #${i + 1}`;

            const file = item.querySelector('input[type="file"]');
            const hidden = item.querySelector('input[type="hidden"]');
            const thuTu = item.querySelector('input[name*="thuTu"]');
            const cb = item.querySelector('input[type="checkbox"]');
            const img = item.querySelector('img.preview-img');

            const previewId = `preview_img_${i}`;

            if (hidden) hidden.name = `hinhAnhSanPhams[${i}].duongDanAnh`;
            if (thuTu) thuTu.name = `hinhAnhSanPhams[${i}].thuTu`;
            if (cb) {
                cb.name = `hinhAnhSanPhams[${i}].laAnhChinh`;
                cb.id = `primary_${i}`;
                cb.setAttribute('onchange', `handlePrimaryChange(${i})`);
                const lb = item.querySelector('label[for^="primary_"]');
                if (lb) lb.setAttribute('for', `primary_${i}`);
            }
            if (img) img.id = previewId;
            if (file) file.setAttribute('onchange', `uploadFile(this, 'hinhAnhSanPhams[${i}].duongDanAnh', '${previewId}')`);
        });
    }

    function reindexColorImages() {
        const list = document.getElementById('colorImagesList');
        const items = list.querySelectorAll('.image-item');

        items.forEach((item, i) => {
            item.setAttribute('data-index', i);

            const num = item.querySelector('.item-number');
            if (num) num.innerHTML = `<i class="fas fa-palette"></i> Hình màu #${i + 1}`;

            const sel = item.querySelector('select[name*=".mauSac"]');
            const file = item.querySelector('input[type="file"]');
            const hidden = item.querySelector('input[type="hidden"]');
            const img = item.querySelector('img.preview-img');

            const previewId = `preview_color_img_${i}`;

            if (sel) sel.name = `hinhAnhMauSacs[${i}].mauSac`;
            if (hidden) hidden.name = `hinhAnhMauSacs[${i}].duongDanAnh`;
            if (img) img.id = previewId;
            if (file) file.setAttribute('onchange', `uploadFile(this, 'hinhAnhMauSacs[${i}].duongDanAnh', '${previewId}')`);
        });
    }

    // ===== Variants =====
    function addVariant(data = null) {
        const list = document.getElementById('variantsList');
        const index = list.children.length;

        const html = `
      <div class="variant-item" data-index="${index}">
        <input type="hidden" data-field="id" name="bienThes[${index}].id" value="${data ? (data.id ?? '') : ''}">

        <div class="item-header">
          <span class="item-number"><i class="fas fa-tags"></i> Biến thể #${index + 1}</span>
          <button type="button" class="btn btn-danger" onclick="removeVariant(this)">
            <i class="fas fa-trash"></i> Xóa
          </button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Màu Sắc <span class="required">*</span></label>
            <select data-field="mauSac" name="bienThes[${index}].mauSac" required onchange="updateSKUFromEl(this)">
              <option value="">-- Chọn màu --</option>
              ${renderOptions(COLORS, data ? data.mauSac : '')}
            </select>
          </div>

          <div class="form-group">
            <label>Kích Cỡ <span class="required">*</span></label>
            <select data-field="kichCo" name="bienThes[${index}].kichCo" required onchange="updateSKUFromEl(this)">
              <option value="">-- Chọn size --</option>
              ${renderOptions(SIZES, data ? data.kichCo : '')}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Mã SKU <span class="required">*</span></label>
                 <input type="text" data-field="maSKU" name="bienThes[${index}].maSKU" required readonly
                   value="${data ? (data.maSKU ?? '') : ''}"
                   placeholder="AO_PHAO_AKP_DEN_S">
          </div>

          <div class="form-group">
            <label>Số Lượng Tồn <span class="required">*</span></label>
                 <input type="number" data-field="soLuongTon" name="bienThes[${index}].soLuongTon" required min="0"
                   value="${data ? (data.soLuongTon ?? 0) : 0}">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Khối Lượng (gram) <span class="required">*</span></label>
                 <input type="number" data-field="khoiLuongGram" name="bienThes[${index}].khoiLuongGram" required min="1"
                   value="${data && data.khoiLuongGram != null ? data.khoiLuongGram : 300}">
          </div>

          <div class="form-group">
            <label>Giá Bán <span class="required">*</span></label>
                 <input type="number" data-field="gia" name="bienThes[${index}].gia" required min="0"
                   value="${data ? (data.gia ?? 0) : 0}">
          </div>

          <div class="form-group">
                 <input type="hidden" data-field="trangThai" name="bienThes[${index}].trangThai" value="ACTIVE">
          </div>
        </div>
      </div>
    `;

        list.insertAdjacentHTML('beforeend', html);

        // auto generate sku for new item if has enough
        const item = list.lastElementChild;
        if (item) updateSKUItem(item);
    }

    function removeVariant(btn) {
        const item = btn.closest('.variant-item');
        if (item) item.remove();
        reindexVariantsUI();
    }

    function trackUpload(promise) {
        pendingUploads.add(promise);
        promise.finally(() => pendingUploads.delete(promise));
        return promise;
    }

    // ===== Upload (shared) =====
    async function uploadFile(input, hiddenInputName, previewId) {
        const uploadPromise = (async () => {
        const file = input.files && input.files[0];
        if (!file) return;

        // local preview
        const preview = document.getElementById(previewId);
        if (preview) {
            preview.src = URL.createObjectURL(file);
            preview.classList.add('show');
        }

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch(`${API_URL}/upload`, {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                body: formData
            });

            if (res.ok) {
                const path = await res.text();
                const item = input.closest('.image-item');
                const hidden = item
                    ? item.querySelector('input[type="hidden"]')
                    : document.querySelector(`input[name="${hiddenInputName}"]`);
                if (hidden) hidden.value = path;
            } else {
                let msg = await res.text();
                if (!msg || !msg.trim()) msg = `HTTP ${res.status}`;

                // Session timeout from AuthInterceptor for AJAX/API requests.
                if (res.status === 401) {
                    try {
                        const parsed = JSON.parse(msg);
                        if (parsed && parsed.message) msg = parsed.message;
                    } catch (_) {
                        // keep raw text fallback
                    }

                    await Swal.fire('Phiên đăng nhập đã hết hạn', msg, 'warning');
                    window.location.href = '/login';
                    return;
                }

                Swal.fire('Lỗi!', `Upload thất bại: ${msg}`, 'error');
            }
        } catch (e) {
            Swal.fire('Lỗi!', `Upload lỗi kết nối: ${e.message}`, 'error');
        }
        })();

        return trackUpload(uploadPromise);
    }

    // ===== Images Gallery =====
    function addImage(data = null) {
        const list = document.getElementById('imagesList');
        const index = list.children.length;
        const previewId = `preview_img_${index}`;

        const html = `
      <div class="image-item" data-index="${index}">
        <div class="item-header">
          <span class="item-number"><i class="fas fa-image"></i> Hình ảnh #${index + 1}</span>
          <button type="button" class="btn btn-danger" onclick="removeImage(this)">
            <i class="fas fa-trash"></i> Xóa
          </button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Chọn Ảnh <span class="required">*</span></label>

            <input type="file"
                   class="file-upload"
                   accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.tif,.tiff,.heic,.heif,image/*"
                     onchange="uploadFile(this, 'hinhAnhSanPhams[${index}].duongDanAnh', '${previewId}')">

                 <input type="hidden" name="hinhAnhSanPhams[${index}].duongDanAnh" required value="${data ? (data.duongDanAnh ?? '') : ''}">

            <img id="${previewId}" class="preview-img ${data && data.duongDanAnh ? 'show' : ''}"
                 src="${data && data.duongDanAnh ? data.duongDanAnh : ''}" alt="Preview">
          </div>

          <div class="form-group">
            <label>Thứ Tự</label>
                        <input type="number" name="hinhAnhSanPhams[${index}].thuTu" min="1"
                   value="${data ? (data.thuTu ?? (index + 1)) : (index + 1)}">

            <div class="checkbox-group">
                            <input type="checkbox" name="hinhAnhSanPhams[${index}].laAnhChinh" id="primary_${index}"
                     ${data && data.laAnhChinh ? 'checked' : (index === 0 ? 'checked' : '')}
                     onchange="handlePrimaryChange(${index})">
              <label for="primary_${index}">Đặt làm ảnh chính</label>
            </div>
          </div>
        </div>
      </div>
    `;

        list.insertAdjacentHTML('beforeend', html);
    }

    function removeImage(btn) {
        const item = btn.closest('.image-item');
        if (item) item.remove();
        reindexImages();
    }

    function setActiveGalleryImage(item) {
        document.querySelectorAll('#imagesList .image-item').forEach(el => {
            el.style.outline = 'none';
            el.style.boxShadow = 'none';
        });
        item.style.outline = '2px solid #8b4d4d';
        item.style.boxShadow = '0 0 0 3px rgba(139,77,77,0.15)';
        const idx = parseInt(item.getAttribute('data-index'), 10);
        activeGalleryImageIndex = Number.isNaN(idx) ? null : idx;
    }

    function getTargetGalleryItem() {
        if (activeGalleryImageIndex !== null) {
            const selected = document.querySelector(`#imagesList .image-item[data-index="${activeGalleryImageIndex}"]`);
            if (selected) return selected;
        }
        return document.querySelector('#imagesList .image-item');
    }

    function setFileToInput(input, file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
    }

    function normalizePastedImage(file, seq) {
        const ext = (file.type && file.type.includes('/')) ? file.type.split('/')[1] : 'png';
        const safeExt = (ext || 'png').replace(/[^a-zA-Z0-9]/g, '').toLowerCase() || 'png';
        return new File([file], `pasted_${Date.now()}_${seq}.${safeExt}`, { type: file.type || 'image/png' });
    }

    function handleGalleryPaste(event) {
        const items = event.clipboardData?.items || [];
        const imageFiles = [];
        for (const item of items) {
            if (item.kind !== 'file') continue;
            const file = item.getAsFile();
            if (file && file.type && file.type.startsWith('image/')) imageFiles.push(file);
        }
        if (imageFiles.length === 0) return;
        event.preventDefault();

        const file = normalizePastedImage(imageFiles[0], 1);
        let imageItem = getTargetGalleryItem();
        if (!imageItem) {
            addImage();
            imageItem = document.querySelector('#imagesList .image-item:last-child');
        }
        if (!imageItem) return;

        setActiveGalleryImage(imageItem);
        const imageIndex = parseInt(imageItem.getAttribute('data-index'), 10);
        const fileInput = imageItem.querySelector('input[type="file"].file-upload');
        if (!fileInput || Number.isNaN(imageIndex)) return;

        setFileToInput(fileInput, file);
        uploadFile(fileInput, `hinhAnhSanPhams[${imageIndex}].duongDanAnh`, `preview_img_${imageIndex}`);
    }

    function handlePrimaryChange(index) {
        const checkboxes = document.querySelectorAll('#imagesList input[type="checkbox"]');
        checkboxes.forEach((cb, i) => { if (i !== index) cb.checked = false; });
    }

    // ===== Color Images =====
    function addColorImage(data = null) {
        const list = document.getElementById('colorImagesList');
        const index = list.children.length;
        const previewId = `preview_color_img_${index}`;

        const html = `
      <div class="image-item" data-index="${index}">
        <div class="item-header">
          <span class="item-number"><i class="fas fa-palette"></i> Hình màu #${index + 1}</span>
          <button type="button" class="btn btn-danger" onclick="removeColorImage(this)">
            <i class="fas fa-trash"></i> Xóa
          </button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Màu Sắc <span class="required">*</span></label>
            <select name="hinhAnhMauSacs[${index}].mauSac" required>
              <option value="">-- Chọn màu --</option>
              ${renderOptions(COLORS, data ? data.mauSac : '')}
            </select>
          </div>

          <div class="form-group">
            <label>Chọn Ảnh <span class="required">*</span></label>

            <input type="file"
                   class="file-upload"
                   accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.tif,.tiff,.heic,.heif,image/*"
                     onchange="uploadFile(this, 'hinhAnhMauSacs[${index}].duongDanAnh', '${previewId}')">

                 <input type="hidden" name="hinhAnhMauSacs[${index}].duongDanAnh" required value="${data ? (data.duongDanAnh ?? '') : ''}">

            <img id="${previewId}" class="preview-img ${data && data.duongDanAnh ? 'show' : ''}"
                 src="${data && data.duongDanAnh ? data.duongDanAnh : ''}" alt="Preview">
          </div>
        </div>
      </div>
    `;

        list.insertAdjacentHTML('beforeend', html);
    }

    function removeColorImage(btn) {
        const item = btn.closest('.image-item');
        if (item) item.remove();
        reindexColorImages();
    }

    function setActiveColorImage(item) {
        document.querySelectorAll('#colorImagesList .image-item').forEach(el => {
            el.style.outline = 'none';
            el.style.boxShadow = 'none';
        });
        item.style.outline = '2px solid #8b4d4d';
        item.style.boxShadow = '0 0 0 3px rgba(139,77,77,0.15)';
        const idx = parseInt(item.getAttribute('data-index'), 10);
        activeColorImageIndex = Number.isNaN(idx) ? null : idx;
    }

    function getTargetColorImageItem() {
        if (activeColorImageIndex !== null) {
            const selected = document.querySelector(`#colorImagesList .image-item[data-index="${activeColorImageIndex}"]`);
            if (selected) return selected;
        }
        return document.querySelector('#colorImagesList .image-item');
    }

    function handleColorImagePaste(event) {
        const items = event.clipboardData?.items || [];
        const imageFiles = [];
        for (const item of items) {
            if (item.kind !== 'file') continue;
            const file = item.getAsFile();
            if (file && file.type && file.type.startsWith('image/')) imageFiles.push(file);
        }
        if (imageFiles.length === 0) return;
        event.preventDefault();

        const file = normalizePastedImage(imageFiles[0], 1);
        let colorItem = getTargetColorImageItem();
        if (!colorItem) {
            addColorImage();
            colorItem = document.querySelector('#colorImagesList .image-item:last-child');
        }
        if (!colorItem) return;

        setActiveColorImage(colorItem);
        const colorIndex = parseInt(colorItem.getAttribute('data-index'), 10);
        const fileInput = colorItem.querySelector('input[type="file"].file-upload');
        if (!fileInput || Number.isNaN(colorIndex)) return;

        setFileToInput(fileInput, file);
        uploadFile(fileInput, `hinhAnhMauSacs[${colorIndex}].duongDanAnh`, `preview_color_img_${colorIndex}`);
    }

    // ===== Sync Colors (from variants -> colorImages) =====
    function normalizeColorKey(color) {
        return toSkuToken(color);
    }

    function getVariantColors() {
        const colors = Array.from(document.querySelectorAll('#variantsList select[name$=".mauSac"]'))
            .map(el => (el.value || '').trim())
            .filter(v => v !== "");

        const seen = new Set();
        const unique = [];
        for (const c of colors) {
            const key = normalizeColorKey(c);
            if (!seen.has(key)) {
                seen.add(key);
                unique.push(c);
            }
        }
        return unique;
    }

    function getExistingColorImageKeys() {
        const keys = new Set();
        document.querySelectorAll('#colorImagesList select[name$=".mauSac"]').forEach(sel => {
            const v = (sel.value || '').trim();
            if (v) keys.add(normalizeColorKey(v));
        });
        return keys;
    }

    function validateBaseFields() {
        const ten = (document.getElementById('ten')?.value || '').trim();
        if (!ten) {
            Swal.fire('Thiếu dữ liệu', 'Vui lòng nhập Tên sản phẩm.', 'warning');
            return false;
        }

        const parentDanhMucId = document.getElementById('parentDanhMucId')?.value || '';
        const childDanhMucId = document.getElementById('danhMucId')?.value || '';
        if (!parentDanhMucId && !childDanhMucId) {
            Swal.fire('Thiếu dữ liệu', 'Vui lòng chọn danh mục.', 'warning');
            return false;
        }

        return true;
    }

    function validateVariants() {
        const items = Array.from(document.querySelectorAll('#variantsList .variant-item'));
        if (items.length === 0) {
            Swal.fire('Thiếu biến thể', 'Vui lòng thêm ít nhất 1 biến thể.', 'warning');
            return false;
        }

        const seen = new Set();
        for (const item of items) {
            const mau = (item.querySelector('select[data-field="mauSac"]')?.value || '').trim();
            const size = (item.querySelector('select[data-field="kichCo"]')?.value || '').trim();
            const sku = (item.querySelector('input[data-field="maSKU"]')?.value || '').trim();
            const soLuongRaw = item.querySelector('input[data-field="soLuongTon"]')?.value;
            const khoiLuongRaw = item.querySelector('input[data-field="khoiLuongGram"]')?.value;
            const giaRaw = item.querySelector('input[data-field="gia"]')?.value;

            if (!mau || !size) {
                Swal.fire('Thiếu dữ liệu', 'Vui lòng chọn đầy đủ màu sắc và kích cỡ cho biến thể.', 'warning');
                return false;
            }
            if (!sku) {
                Swal.fire('Thiếu dữ liệu', 'Vui lòng đảm bảo mã SKU được tạo cho biến thể.', 'warning');
                return false;
            }

            const soLuong = Number(soLuongRaw);
            if (!Number.isFinite(soLuong) || soLuong < 0) {
                Swal.fire('Dữ liệu không hợp lệ', 'Số lượng tồn phải là số >= 0.', 'warning');
                return false;
            }

            const khoiLuong = Number(khoiLuongRaw);
            if (!Number.isFinite(khoiLuong) || khoiLuong <= 0) {
                Swal.fire('Dữ liệu không hợp lệ', 'Khối lượng phải là số > 0.', 'warning');
                return false;
            }

            const gia = Number(giaRaw);
            if (!Number.isFinite(gia) || gia < 0) {
                Swal.fire('Dữ liệu không hợp lệ', 'Giá bán phải là số >= 0.', 'warning');
                return false;
            }

            const key = `${mau}__${size}`.toLowerCase();
            if (seen.has(key)) {
                Swal.fire('Trùng biến thể', 'Không được trùng màu sắc + kích cỡ.', 'warning');
                return false;
            }
            seen.add(key);
        }

        return true;
    }

    function syncColors() {
        const variantColors = getVariantColors();
        if (variantColors.length === 0) {
            Swal.fire('Thông báo', 'Chưa có màu trong biến thể để đồng bộ.', 'info');
            return;
        }

        const existingKeys = getExistingColorImageKeys();
        let added = 0;

        variantColors.forEach(color => {
            const key = normalizeColorKey(color);
            if (!existingKeys.has(key)) {
                addColorImage({ mauSac: color, duongDanAnh: "" });
                existingKeys.add(key);
                added++;
            }
        });

        if (added === 0) {
            Swal.fire('OK', 'Tất cả màu trong biến thể đã có Hình màu rồi.', 'success');
        } else {
            Swal.fire('Thành công', `Đã thêm ${added} Hình màu mới.`, 'success');
        }
    }

    // ===== Submit =====
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!validateBaseFields() || !validateVariants()) {
            return;
        }

        document.getElementById('loading').classList.add('show');

        if (pendingUploads.size > 0) {
            await Promise.allSettled(Array.from(pendingUploads));
        }

        // Ensure latest SKU update for all variants before submit
        document.querySelectorAll('#variantsList .variant-item').forEach(item => updateSKUItem(item));

        // Resolve final category from child or parent selection.
        const childDanhMucId = document.getElementById('danhMucId').value;
        const parentDanhMucId = document.getElementById('parentDanhMucId').value;
        document.getElementById('finalDanhMucId').value = childDanhMucId || parentDanhMucId || '';

        // Remove gallery items that do not have uploaded path.
        Array.from(document.querySelectorAll('#imagesList .image-item')).forEach((el) => {
            const hidden = el.querySelector('input[type="hidden"]');
            if (!hidden || !hidden.value || hidden.value.trim() === '') {
                el.remove();
            }
        });

        // Remove invalid color image items.
        Array.from(document.querySelectorAll('#colorImagesList .image-item')).forEach((el) => {
            const mauSac = el.querySelector('select[name$=".mauSac"]')?.value || '';
            const hidden = el.querySelector('input[type="hidden"]');
            if (!mauSac.trim() || !hidden || !hidden.value || hidden.value.trim() === '') {
                el.remove();
            }
        });

        reindexVariantsUI();
        reindexImages();
        reindexColorImages();

        const galleryItems = document.querySelectorAll('#imagesList .image-item');
        if (galleryItems.length === 0) {
            document.getElementById('loading').classList.remove('show');
            Swal.fire('Thiếu ảnh', 'Vui lòng tải lên ít nhất 1 ảnh gallery trước khi lưu.', 'warning');
            return;
        }

        // Ensure one primary image for backend rule.
        const checkedMain = document.querySelector('#imagesList input[type="checkbox"]:checked');
        if (!checkedMain) {
            const firstMain = document.querySelector('#imagesList input[type="checkbox"]');
            if (firstMain) firstMain.checked = true;
        }

        e.target.submit();
    });
</script>
</body>
</html>
